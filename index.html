<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Accedi</title>
    <!-- Font Google: Syne (display) + DM Sans (corpo) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body class="auth-page" id="appBody">

    <!-- =====================================================
         TOGGLE TEMA DARK/LIGHT (in alto a destra)
    ====================================================== -->
    <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
        <span class="theme-icon">☀️</span>
    </button>

    <!-- =====================================================
         SFONDO DECORATIVO (sfere animate CSS)
    ====================================================== -->
    <div class="bg-decoration" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- =====================================================
         CONTENITORE PRINCIPALE AUTH
    ====================================================== -->
    <main class="auth-container">

        <!-- Logo e titolo app -->
        <div class="auth-brand">
            <div class="brand-icon">✓</div>
            <h1 class="brand-title">TaskFlow</h1>
            <p class="brand-subtitle">Organizza. Monitora. Completa.</p>
        </div>

        <!-- Card con i form login/registrazione -->
        <div class="auth-card">

            <!-- Tab per passare tra Login e Registrazione -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tabLogin"
                        role="tab" aria-selected="true" aria-controls="panelLogin"
                        onclick="switchTab('login')">
                    Accedi
                </button>
                <button class="auth-tab" id="tabRegister"
                        role="tab" aria-selected="false" aria-controls="panelRegister"
                        onclick="switchTab('register')">
                    Registrati
                </button>
                <!-- Indicatore animato del tab attivo -->
                <div class="tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- ==========================================
                 PANNELLO LOGIN
            =========================================== -->
            <div class="auth-panel active" id="panelLogin" role="tabpanel">
                <h2 class="panel-title">Bentornato!</h2>
                <p class="panel-desc">Inserisci le tue credenziali per accedere.</p>

                <!-- Messaggio di errore/successo -->
                <div class="alert" id="loginAlert" role="alert" aria-live="polite"></div>

                <!-- Form login (non usa <form> per evitare reload, gestito da JS) -->
                <div class="form-group">
                    <label class="form-label" for="loginUsername">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            class="form-input"
                            id="loginUsername"
                            placeholder="il_tuo_username"
                            autocomplete="username"
                            maxlength="50"
                        >
                    </div>
                    <!-- Messaggio errore validazione client-side -->
                    <span class="field-error" id="loginUsernameError"></span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            class="form-input"
                            id="loginPassword"
                            placeholder="••••••••"
                            autocomplete="current-password"
                        >
                        <!-- Bottone mostra/nascondi password -->
                        <button class="toggle-password" type="button"
                                onclick="togglePasswordVisibility('loginPassword')"
                                aria-label="Mostra/nascondi password">
                            👁️
                        </button>
                    </div>
                    <span class="field-error" id="loginPasswordError"></span>
                </div>

                <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
                    <span class="btn-text">Accedi</span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>

                <!-- Separatore -->
                <div class="auth-divider">
                    <span>oppure</span>
                </div>

                <!-- Bottone Google OAuth2 -->
                <a href="oauth_google.php" class="btn-google" id="googleLoginBtn">
                    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Accedi con Google
                </a>
            </div>

            <!-- ==========================================
                 PANNELLO REGISTRAZIONE
            =========================================== -->
            <div class="auth-panel" id="panelRegister" role="tabpanel">
                <h2 class="panel-title">Crea Account</h2>
                <p class="panel-desc">Scegli un username e una password sicura.</p>

                <div class="alert" id="registerAlert" role="alert" aria-live="polite"></div>

                <div class="form-group">
                    <label class="form-label" for="regUsername">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            class="form-input"
                            id="regUsername"
                            placeholder="scegli_username"
                            autocomplete="username"
                            maxlength="50"
                            oninput="validateUsernameField()"
                        >
                    </div>
                    <span class="field-error" id="regUsernameError"></span>
                    <!-- Contatore caratteri -->
                    <span class="char-count" id="regUsernameCount">0/50</span>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            class="form-input"
                            id="regPassword"
                            placeholder="Min. 6 caratteri"
                            autocomplete="new-password"
                            oninput="checkPasswordStrength()"
                        >
                        <button class="toggle-password" type="button"
                                onclick="togglePasswordVisibility('regPassword')"
                                aria-label="Mostra/nascondi password">
                            👁️
                        </button>
                    </div>
                    <span class="field-error" id="regPasswordError"></span>
                    <!-- Barra indicatore forza password -->
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar" id="strengthBar"></div>
                        <span class="strength-label" id="strengthLabel"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regConfirm">Conferma Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            class="form-input"
                            id="regConfirm"
                            placeholder="Ripeti la password"
                            autocomplete="new-password"
                        >
                    </div>
                    <span class="field-error" id="regConfirmError"></span>
                </div>

                <button class="btn-primary" id="registerBtn" onclick="handleRegister()">
                    <span class="btn-text">Crea Account</span>
                    <span class="btn-loader" aria-hidden="true"></span>
                </button>
            </div>

        </div><!-- fine auth-card -->

        <p class="auth-footer">
            TaskFlow &copy; 2025 — Progetto scolastico
        </p>

    </main>

    <!-- Script principale -->
    <script src="script.js"></script>
    <script>
        // Controlla se l'utente è già loggato, reindirizza alla dashboard
        checkIfAlreadyLogged();

        // Inizializza il tema salvato
        initTheme();

        // Permette il submit dei form con il tasto Invio
        document.getElementById('loginPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('regConfirm').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>
</body>
</html>
